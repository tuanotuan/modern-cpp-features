name: Validate Recall

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    paths:
      - "cpp98_foundation/**"
      - "cpp11/**"
      - "cpp20/**"
      - "python/**"
      - "web/**"
      - ".github/workflows/web-validate.yml"
  pull_request:
    paths:
      - "cpp98_foundation/**"
      - "cpp11/**"
      - "cpp20/**"
      - "python/**"
      - "web/**"
      - ".github/workflows/web-validate.yml"

permissions:
  contents: write

concurrency:
  group: web-validate-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  refresh-content:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run content:refresh
      - run: npm run validate
      - name: Commit refreshed content
        working-directory: .
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Content already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/content web/src/generated
          git commit -m "chore(content): refresh interview question queue"
          git push
      - name: Sync current content snapshot to Supabase
        run: npm run content:sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTENT_REPOSITORY: ${{ github.repository }}
          CONTENT_GITHUB_RUN_ID: ${{ github.run_id }}
          OPENAI_LUNA_MODEL: gpt-5.6-luna
      - name: Generate queued DB-native question drafts
        run: npm run content:generate:db
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_LUNA_MODEL: gpt-5.6-luna
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_FALLBACK_ENABLED: "true"
          GEMINI_FALLBACK_MODEL: gemini-3.5-flash
          CONTENT_GENERATION_MAX_JOBS: "8"

  validate:
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run validate
