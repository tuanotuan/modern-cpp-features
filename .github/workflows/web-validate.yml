name: Validate C++ Recall

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    paths:
      - "cpp98_foundation/**"
      - "cpp11/**"
      - "cpp20/**"
      - "web/**"
      - ".github/workflows/web-validate.yml"
  pull_request:
    paths:
      - "cpp98_foundation/**"
      - "cpp11/**"
      - "cpp20/**"
      - "web/**"
      - ".github/workflows/web-validate.yml"

permissions:
  contents: write

concurrency:
  group: web-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-content:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run content:auto
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_MODEL: gemini-3-flash-preview
      - run: npm run validate
      - name: Commit refreshed content
        working-directory: .
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Content already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/content web/src/generated
          git commit -m "chore(content): refresh interview question queue"
          git push

  validate:
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run validate
