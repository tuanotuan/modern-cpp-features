  - id: cpp11-final-004
    lessonId: cpp11-final
    type: scenario
    difficulty: intermediate
    estimatedMinutes: 4
    prompt: >-
      Một nhóm thiết kế một lớp `Connection` đã hoàn thiện và không muốn bất kỳ lớp nào kế thừa từ
      nó. Trong khi đó, họ có một lớp phân cấp khác chứa thuật toán đã được kiểm chứng: lớp
      `Derived` cần ghi đè `run()` từ lớp cơ sở, nhưng các lớp cháu không được thay đổi thuật toán
      này nữa.


      Bạn sẽ dùng `final` ở đâu trong hai trường hợp trên? Nêu cú pháp tương ứng và giải thích vì
      sao không nên mặc định thêm `final` vào mọi lớp hoặc mọi hàm.
    hint: Trường hợp thứ nhất cấm kế thừa toàn bộ lớp; trường hợp thứ hai chỉ cấm ghi đè một hàm virtual
      sau một điểm cụ thể trong phân cấp.
    answer:
      short: Dùng `class Connection final` để cấm kế thừa; dùng `void run() override final;` trong
        `Derived` để cho phép `Derived` ghi đè nhưng cấm các lớp sau ghi đè tiếp. Không nên dùng
        `final` tràn lan vì nó có thể chặn các mở rộng hợp lệ.
      detailed: "Với `Connection` không được thiết kế làm lớp cơ sở, khai báo `class Connection final {
        };` biến việc kế thừa từ lớp này thành lỗi biên dịch. Với thuật toán đã được kiểm chứng, nếu
        `Derived::run()` ghi đè một hàm virtual của lớp cơ sở nhưng phải là điểm cuối của việc thay
        thế hành vi, dùng `void run() override final;`. `override` xác nhận rằng hàm thực sự ghi đè
        hàm virtual của lớp cơ sở, còn `final` ngăn mọi lớp dẫn xuất sau `Derived` ghi đè lại hàm
        đó. Không nên thêm `final` ở mọi nơi: việc này có thể ngăn những phần mở rộng hợp lệ của hệ
        thống phân cấp. `final` nên thể hiện một chủ đích thiết kế cụ thể, chẳng hạn lớp không dành
        cho kế thừa hoặc một bất biến/thuật toán không được phép thay đổi."
    rubric:
      required:
        - Chọn đúng `final` ở mức lớp cho `Connection`.
        - Chọn đúng `override final` ở mức hàm cho thuật toán.
        - Giải thích được tác hại của việc sử dụng `final` quá sớm hoặc quá rộng.
      bonus:
        - Liên hệ việc dùng `final` với thuật toán đã được kiểm chứng, quy tắc bảo mật/rủi ro hoặc
          bất biến.
      misconceptions:
        - Dùng `final` ở hàm để cấm kế thừa toàn bộ lớp.
        - Dùng `final` ở lớp nhưng vẫn cho rằng lớp khác có thể kế thừa.
        - Cho rằng `final` luôn tốt hơn khả năng mở rộng.
