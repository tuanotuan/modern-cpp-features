  - id: cpp11-lambda-capture-value-001
    lessonId: cpp11-lambda-capture-value
    type: code_reasoning
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Xem xét đoạn mã sau đây và cho biết giá trị in ra màn hình là gì? Giải thích tại sao việc
      thay đổi biến `threshold` sau khi định nghĩa lambda không ảnh hưởng đến kết quả của hàm
      `isLarge`.
    code: |-
      int threshold = 100;

      auto isLarge = [threshold](int quantity) {
          return quantity > threshold;
      };

      threshold = 200;

      if (isLarge(150)) {
          std::cout << "True";
      } else {
          std::cout << "False";
      }
    hint: Hãy chú ý vào thời điểm biến được copy vào lambda và cơ chế hoạt động của capture by value.
    answer:
      short: Kết quả in ra là "True".
      detailed: Khi sử dụng capture by value `[threshold]`, lambda sẽ tạo ra một bản sao (copy) của biến
        tại đúng thời điểm lambda được định nghĩa. Tại thời điểm đó, `threshold` có giá trị là 100.
        Mọi thay đổi sau đó đối với biến `threshold` gốc (như gán bằng 200) sẽ không cập nhật vào
        bản sao bên trong lambda. Vì vậy, khi gọi `isLarge(150)`, lambda vẫn thực hiện so sánh `150
        > 100`, kết quả là đúng (True).
    rubric:
      required:
        - Giải thích được cơ chế copy tại thời điểm định nghĩa (moment of creation).
        - Xác định đúng kết quả in ra là True.
      bonus:
        - Đề cập đến khái niệm 'snapshot' (ảnh chụp nhanh) của biến.
      misconceptions:
        - Nghĩ rằng lambda sẽ tự động cập nhật giá trị mới nhất của biến bên ngoài khi được gọi.
    sources:
      - sectionId: important-behavior
      - sectionId: common-mistakes
    sourceHash: 6b5987e7109ffa1c075d293934727412220f98def9b4ed10db67737341686905
    status: draft
    version: 1
  - id: cpp11-lambda-capture-value-002
    lessonId: cpp11-lambda-capture-value
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 7
    prompt: Trong các hệ thống giao dịch (trading) yêu cầu hiệu năng cao, tại sao việc sử dụng capture
      by value cho các đối tượng như `std::vector` hoặc các container lớn lại được coi là một sai
      lầm phổ biến? Bạn nên sử dụng capture by value trong trường hợp nào để đảm bảo an toàn và hiệu
      quả?
    hint: Hãy nghĩ về chi phí tài nguyên khi sao chép dữ liệu và mục đích của việc giữ một giá trị ổn
      định.
    answer:
      short: Capture đối tượng lớn gây tốn bộ nhớ và thời gian copy; nên dùng capture by value cho các
        biến nhỏ hoặc khi cần một snapshot ổn định.
      detailed: "Việc capture các đối tượng lớn theo giá trị (ví dụ: `[orders]`) sẽ khiến toàn bộ dữ liệu
        của đối tượng đó bị sao chép vào lambda, gây tốn kém về bộ nhớ và thời gian xử lý (latency),
        điều này rất nhạy cảm trong trading. Capture by value chỉ nên được sử dụng khi: 1. Các biến
        có kích thước nhỏ (như `int`, `double`). 2. Bạn cần lambda giữ một 'snapshot' ổn định, không
        bị thay đổi bởi các logic bên ngoài sau khi lambda được tạo (ví dụ: giữ nguyên một ngưỡng
        chặn risk limit cố định)."
    rubric:
      required:
        - Nêu được vấn đề về chi phí copy (memory/time) đối với object lớn.
        - Chỉ ra được lợi ích của việc tạo 'stable snapshot' cho các quy tắc (rules).
      bonus:
        - Liên hệ được với các ví dụ thực tế trong trading như threshold hoặc risk limit.
      misconceptions:
        - Cho rằng capture by value luôn luôn không tốt (thực tế nó rất an toàn cho các biến nhỏ).
    sources:
      - sectionId: common-mistakes
      - sectionId: when-should-you-use-capture-by-value
      - sectionId: notes-for-trading-performance-sensitive-code
    sourceHash: 6b5987e7109ffa1c075d293934727412220f98def9b4ed10db67737341686905
    status: draft
    version: 1
  - id: cpp11-mutable-lambda-001
    lessonId: cpp11-mutable-lambda
    type: code_reasoning
    difficulty: beginner
    estimatedMinutes: 5
    prompt: Xem xét đoạn mã sau đây. Giá trị của biến `count` được in ra ở dòng cuối cùng là bao nhiêu?
      Giải thích tại sao từ khóa `mutable` lại cần thiết trong trường hợp này.
    code: |-
      int count = 10;
      auto lambda = [count]() mutable {
          count++;
      };
      lambda();
      std::cout << count;
    hint: Hãy nhớ lại sự khác biệt giữa bản sao bên trong lambda và biến gốc bên ngoài khi sử dụng
      capture by value.
    answer:
      short: Giá trị in ra là 10. Từ khóa `mutable` cho phép sửa đổi bản sao của `count` bên trong lambda.
      detailed: Giá trị in ra vẫn là 10 vì lambda capture `count` theo giá trị (by value), tạo ra một bản
        sao nội bộ. Theo mặc định, các biến capture by value là hằng số (read-only) bên trong
        lambda. Từ khóa `mutable` cho phép lambda sửa đổi bản sao nội bộ này, nhưng mọi thay đổi chỉ
        giới hạn trong phạm vi lambda và không ảnh hưởng đến biến `count` gốc ở bên ngoài.
    rubric:
      required:
        - Xác định đúng giá trị in ra là 10
        - Giải thích được mutable cho phép sửa đổi bản sao (copy)
        - Khẳng định biến gốc không bị thay đổi
      bonus:
        - Giải thích được mặc định capture by value là không thể sửa đổi (read-only)
      misconceptions:
        - Nhầm lẫn rằng mutable sẽ thay đổi biến gốc giống như capture by reference
    sources:
      - sectionId: what-problem-does-it-solve
      - sectionId: minimum-syntax
      - sectionId: common-mistakes
    sourceHash: 031472acac3954460c5c511914ec594fb59a4c5b07326b7e2df7cdab37257beb
    status: draft
    version: 1
  - id: cpp11-mutable-lambda-002
    lessonId: cpp11-mutable-lambda
    type: scenario
    difficulty: intermediate
    estimatedMinutes: 7
    prompt: Trong một hệ thống giao dịch (trading system), bạn cần viết một lambda để đếm số lượng lệnh
      (Order) có khối lượng lớn đi qua một bộ lọc, nhưng bạn KHÔNG muốn làm thay đổi biến đếm gốc ở
      bên ngoài phạm vi lambda để tránh các tác dụng phụ (side effects) không mong muốn. Bạn sẽ
      thiết kế lambda này như thế nào và tại sao?
    hint: Cân nhắc giữa việc sử dụng `[x] mutable` và `[&x]` dựa trên yêu cầu không làm thay đổi biến
      gốc.
    answer:
      short: Sử dụng capture by value kết hợp với từ khóa `mutable` ([count] mutable).
      detailed: Bạn nên sử dụng capture by value kèm theo từ khóa `mutable`. Cách tiếp cận này cho phép
        lambda tạo ra và duy trì một trạng thái riêng tư (private state) bên trong nó. Khi lambda
        thực thi và tăng biến đếm, nó chỉ cập nhật bản sao nội bộ của chính nó. Điều này đảm bảo
        tính đóng gói, cho phép lambda theo dõi trạng thái cục bộ mà không gây ra tác dụng phụ lên
        biến gốc bên ngoài, phù hợp với yêu cầu bảo vệ dữ liệu gốc trong hệ thống.
    rubric:
      required:
        - Đề xuất sử dụng capture by value với từ khóa mutable
        - Giải thích được mục đích là giữ trạng thái riêng tư (private state)
        - Giải thích được tại sao không dùng capture by reference trong ngữ cảnh này (tránh side
          effect)
      bonus:
        - Chỉ ra rằng lambda này nên ngắn gọn và mang tính cục bộ
      misconceptions:
        - Sử dụng capture by reference sẽ vi phạm yêu cầu không thay đổi biến gốc
    sources:
      - sectionId: when-should-you-use-mutable-lambda
      - sectionId: notes-for-trading-performance-sensitive-code
    sourceHash: 031472acac3954460c5c511914ec594fb59a4c5b07326b7e2df7cdab37257beb
    status: draft
    version: 1
  - id: cpp11-lambda-algorithms-001
    lessonId: cpp11-lambda-algorithms
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: "Khi viết lambda làm comparator cho hàm `std::sort`, tại sao việc sử dụng toán tử `<=` (ví
      dụ: `return a.price <= b.price;`) lại bị coi là một sai lầm phổ biến? Bạn nên sử dụng toán tử
      nào thay thế?"
    hint: Hãy nghĩ về quy tắc so sánh nghiêm ngặt (strict comparison) mà thuật toán sắp xếp yêu cầu.
    answer:
      short: Sử dụng `<=` vi phạm nguyên tắc so sánh của `std::sort`; bạn nên sử dụng toán tử `<`.
      detailed: Trong C++, `std::sort` yêu cầu một bộ so sánh tuân thủ quy tắc 'strict weak ordering'. Nếu
        bạn sử dụng `<=`, khi hai phần tử bằng nhau (a == b), bộ so sánh sẽ trả về true cho cả (a,
        b) và (b, a), điều này gây mâu thuẫn logic cho thuật toán. Quy tắc đúng là chỉ trả về true
        nếu phần tử thứ nhất thực sự nên đứng trước phần tử thứ hai. Vì vậy, sử dụng `<` là cách
        tiếp cận chuẩn xác để đảm bảo tính ổn định và tránh hành vi không xác định.
    rubric:
      required:
        - Chỉ ra việc sử dụng <= là sai
        - Nêu được toán tử đúng là <
        - Giải thích được lý do liên quan đến logic so sánh/strict comparison
      bonus:
        - Nhắc đến việc tránh mâu thuẫn khi hai phần tử bằng nhau
      misconceptions:
        - Cho rằng <= giúp sắp xếp nhanh hơn hoặc bao quát hơn
    sources:
      - sectionId: common-mistakes
      - sectionId: sort-with-lambda
    sourceHash: 02bcc9b9c9874a0d29690cb0b5c981939bd7911849ffa97ca013ee72a17e2647
    status: draft
    version: 1
  - id: cpp11-lambda-algorithms-002
    lessonId: cpp11-lambda-algorithms
    type: scenario
    difficulty: intermediate
    estimatedMinutes: 7
    prompt: Giả sử bạn đang làm việc với một hệ thống giao dịch (trading) có hiệu năng cao, xử lý danh
      sách các đối tượng `Order` rất lớn. Khi sử dụng `std::for_each` để duyệt qua danh sách này và
      chỉ để đọc dữ liệu, bạn nên khai báo kiểu tham số cho lambda như thế nào? Tại sao?
    code: |-
      struct Order {
          int id;
          std::string symbol;
          double price;
          int quantity;
          // ... nhiều trường dữ liệu khác
      };

      std::vector<Order> orders;
      // ... nạp dữ liệu vào orders

      std::for_each(orders.begin(), orders.end(), []( /* Tham số khai báo thế nào? */ ) {
          // Chỉ đọc dữ liệu để xử lý
      });
    hint: Cân nhắc giữa việc sao chép đối tượng (copy) và sử dụng tham chiếu (reference) để tối ưu tốc
      độ.
    answer:
      short: Nên sử dụng `const Order& order`.
      detailed: "Trong các hệ thống nhạy cảm về hiệu năng như trading, việc tránh sao chép các đối tượng
        lớn là cực kỳ quan trọng. Sử dụng tham chiếu hằng (`const Order&`) giúp: 1. Tránh chi phí
        copy đối tượng (unnecessary copies), giúp code chạy nhanh hơn. 2. Đảm bảo an toàn dữ liệu
        bằng cách ngăn chặn việc vô tình sửa đổi đối tượng bên trong lambda khi mục đích chỉ là đọc.
        Bạn chỉ nên dùng `Order&` (không có const) khi thực sự có ý định thay đổi dữ liệu của phần
        tử đó."
    rubric:
      required:
        - Đề xuất sử dụng const Order&
        - Giải thích được lý do tránh copy đối tượng lớn
        - Giải thích được ý nghĩa của const trong việc bảo vệ dữ liệu
      bonus:
        - Liên hệ được với ngữ cảnh hiệu năng cao/trading
      misconceptions:
        - Sử dụng tham trị (Order order) vì nghĩ rằng nó an toàn hơn
    sources:
      - sectionId: for-each-with-lambda
      - sectionId: common-mistakes
      - sectionId: notes-for-trading-performance-sensitive-code
    sourceHash: 02bcc9b9c9874a0d29690cb0b5c981939bd7911849ffa97ca013ee72a17e2647
    status: draft
    version: 1
  - id: cpp11-static-assert-001
    lessonId: cpp11-static-assert
    type: pitfall
    difficulty: beginner
    estimatedMinutes: 3
    prompt: Một lập trình viên cố gắng thực hiện kiểm tra dữ liệu đầu vào từ người dùng bằng đoạn mã
      sau. Tại sao đoạn mã này không thể biên dịch thành công?
    code: |-
      #include <iostream>

      int main() {
          int n;
          std::cout << "Nhập một số dương: ";
          std::cin >> n;

          static_assert(n > 0, "n phải là số dương");

          return 0;
      }
    hint: Hãy xem xét thời điểm mà static_assert thực hiện việc kiểm tra so với thời điểm người dùng
      nhập dữ liệu.
    answer:
      short: static_assert yêu cầu điều kiện phải được đánh giá tại thời điểm biên dịch (compile-time),
        trong khi giá trị của 'n' chỉ được biết tại thời điểm chạy (runtime).
      detailed: static_assert được thiết kế để kiểm tra các điều kiện tại thời điểm biên dịch. Trong đoạn
        mã trên, biến 'n' được nhập từ bàn phím thông qua std::cin, nghĩa là giá trị của nó chỉ tồn
        tại khi chương trình đang chạy (runtime). Trình biên dịch không thể biết trước người dùng sẽ
        nhập gì để đánh giá điều kiện 'n > 0', dẫn đến lỗi biên dịch. Để static_assert hoạt động,
        điều kiện bên trong phải là một hằng số hoặc biểu thức constexpr.
    rubric:
      required:
        - Giải thích được static_assert hoạt động tại compile-time
        - Chỉ ra được 'n' là giá trị runtime/user input
        - Khẳng định trình biên dịch không thể biết giá trị của 'n'
      bonus:
        - Đề cập đến việc static_assert cần constexpr hoặc hằng số
      misconceptions:
        - Nhầm lẫn rằng static_assert có thể thay thế lệnh if để kiểm tra dữ liệu người dùng
    sources:
      - sectionId: common-mistakes
      - sectionId: working-with-constexpr
    sourceHash: 9173c6bfb3e4b733a510dfa5d7922416b68b41a5d6417afce5f4fc9cacf5879e
    status: draft
    version: 1
  - id: cpp11-static-assert-002
    lessonId: cpp11-static-assert
    type: scenario
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Giả sử bạn đang xây dựng một hệ thống giao dịch với hằng số cấu hình `constexpr int
      MaxOrders = 1000;`. Bạn được yêu cầu phải đảm bảo rằng cấu hình này không bao giờ vượt quá
      5000 để tránh treo hệ thống. Tại sao việc sử dụng `static_assert` lại ưu việt hơn việc sử dụng
      câu lệnh `if` thông thường trong hàm `main` để kiểm tra điều kiện này?
    hint: Điều gì xảy ra nếu cấu hình sai được đưa vào môi trường thực tế (production)?
    answer:
      short: static_assert ngăn chặn việc tạo ra một chương trình lỗi ngay từ khâu biên dịch, thay vì đợi
        đến khi chạy mới phát hiện lỗi.
      detailed: Sử dụng static_assert giúp thực thi quy tắc cấu hình ngay tại thời điểm biên dịch. Nếu
        `MaxOrders` vi phạm điều kiện (ví dụ đặt là 10000), trình biên dịch sẽ báo lỗi và không tạo
        ra file thực thi (binary). Điều này giúp loại bỏ hoàn toàn rủi ro triển khai một phần mềm có
        cấu hình sai lên hệ thống. Ngược lại, nếu dùng lệnh `if` trong runtime, chương trình vẫn
        được biên dịch thành công và chỉ phát hiện lỗi khi đã bắt đầu chạy, điều này có thể gây ra
        rủi ro muộn hơn trong quy trình vận hành.
    rubric:
      required:
        - Nêu được lợi ích của việc phát hiện lỗi sớm tại thời điểm biên dịch
        - Giải thích rằng static_assert ngăn chặn việc tạo ra file thực thi lỗi
        - So sánh được với rủi ro của việc kiểm tra tại runtime (if statement)
      bonus:
        - Đề cập đến việc static_assert giúp tài liệu hóa các giả định quan trọng của mã nguồn
      misconceptions:
        - Cho rằng static_assert và if có hiệu năng giống nhau (thực tế static_assert không tốn chi
          phí runtime)
    sources:
      - sectionId: what-problem-does-it-solve
      - sectionId: when-should-you-use-static-assert
      - sectionId: conclusion
