  - id: cpp11-range-based-for-002
    lessonId: cpp11-range-based-for
    type: scenario
    difficulty: beginner
    estimatedMinutes: 4
    prompt: Trong quá trình tái cấu trúc mã nguồn (refactoring), bạn muốn chuyển đổi các vòng lặp sử
      dụng iterator cũ sang range-based for. Tuy nhiên, có những tình huống cụ thể nào mà bạn KHÔNG
      NÊN sử dụng range-based for?
    hint: Hãy nghĩ về các trường hợp bạn cần can thiệp sâu vào vị trí của phần tử hoặc thay đổi kích
      thước của danh sách.
    answer:
      short: Không nên dùng khi cần chỉ số (index), khi cần xóa phần tử trong lúc lặp, hoặc khi cần điều
        khiển iterator phức tạp.
      detailed: >-
        Mặc dù range-based for giúp mã nguồn sạch hơn, nhưng nên tránh sử dụng trong các trường hợp
        sau:

        1. Khi cần sử dụng chỉ số (index) của phần tử (ví dụ: cần biến `i` để tính toán logic).

        2. Khi cần thay đổi cấu trúc của container ngay trong vòng lặp, chẳng hạn như xóa (erase)
        phần tử, vì việc này có thể làm mất hiệu lực (invalidate) các iterator ngầm định của vòng
        lặp.

        3. Khi cần các kiểu duyệt phức tạp hơn là đi qua từng phần tử từ đầu đến cuối (ví dụ: duyệt
        ngược, hoặc nhảy cách quãng).
    rubric:
      required:
        - Nêu được trường hợp cần chỉ số (index)
        - Nêu được trường hợp xóa/thêm phần tử làm invalidate iterator
      bonus:
        - Nêu được trường hợp cần điều khiển iterator phức tạp (duyệt ngược, nhảy bước)
      misconceptions:
        - Cho rằng range-based for có thể thay thế hoàn toàn mọi loại vòng lặp for truyền thống
