  - id: cpp11-defaulted-functions-001
    lessonId: cpp11-defaulted-functions
    type: code_reasoning
    difficulty: beginner
    estimatedMinutes: 5
    prompt: Giả sử bạn có đoạn code sau đây. Tại sao dòng khai báo `Order order1;` trong hàm `main` lại
      gây lỗi biên dịch, và bạn nên thêm dòng code nào vào class `Order` để sửa lỗi này bằng cách sử
      dụng tính năng của C++11?
    code: |-
      class Order {
      public:
          Order(int id) : id(id) {}
      private:
          int id;
      };

      int main() {
          Order order1; // Lỗi biên dịch tại đây
          return 0;
      }
    hint: Hãy nhớ rằng khi bạn tự định nghĩa một constructor có tham số, trình biên dịch sẽ không còn tự
      động cung cấp constructor mặc định nữa.
    answer:
      short: Lỗi xảy ra vì trình biên dịch ngừng cung cấp constructor mặc định khi đã có constructor tùy
        chỉnh. Để sửa, thêm `Order() = default;` vào phần public của class.
      detailed: Trong C++, nếu một class không có constructor nào, trình biên dịch sẽ tự động tạo một
        default constructor (không tham số). Tuy nhiên, ngay khi bạn khai báo một constructor tùy
        chỉnh (như `Order(int id)`), trình biên dịch sẽ không tự động tạo default constructor nữa.
        Để khôi phục lại constructor mặc định mà không cần viết thân hàm thủ công, C++11 cung cấp cú
        pháp `= default`. Việc thêm `Order() = default;` yêu cầu trình biên dịch tạo ra triển khai
        mặc định chuẩn cho constructor không tham số.
    rubric:
      required:
        - Giải thích được việc trình biên dịch ngừng tạo default constructor khi có constructor tùy
          chỉnh
        - Sử dụng đúng cú pháp `Order() = default;`
      bonus:
        - Nêu được đây là tính năng của C++11
        - Đề cập đến việc giúp code tường minh hơn về ý định của lập trình viên
      misconceptions:
        - Nhầm lẫn rằng trình biên dịch luôn luôn tạo default constructor trong mọi trường hợp
    sources:
      - sectionId: what-problem-does-it-solve
      - sectionId: minimum-syntax
    sourceHash: 858ea00b54d09ef8a71c834ad89beb8edeb71d18aff23342cc6cf7f256fbc0ef
    status: draft
    version: 1
  - id: cpp11-defaulted-functions-002
    lessonId: cpp11-defaulted-functions
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 7
    prompt: Một lập trình viên cho rằng việc viết `Order() = default;` hoàn toàn giống hệt với việc viết
      `Order() {}`. Ý kiến này có đúng không? Ngoài ra, nếu sử dụng `Order() = default;`, các biến
      thành viên kiểu `int` trong class có mặc định được khởi tạo về giá trị 0 không?
    code: |-
      class Order {
      public:
          Order() = default;
      private:
          int id;
      };
    hint: Hãy xem xét sự khác biệt giữa việc yêu cầu trình biên dịch tạo hàm và việc tự viết thân hàm,
      cũng như cách các kiểu dữ liệu cơ bản được khởi tạo.
    answer:
      short: "Không giống hệt nhau: `= default` yêu cầu trình biên dịch tạo triển khai chuẩn, còn `{}` là
        hàm do người dùng định nghĩa. `= default` không tự khởi tạo `int` về 0 trừ khi có default
        member initializer."
      detailed: "Thứ nhất, `= default` và `{}` không hoàn toàn giống nhau. `= default` yêu cầu trình biên
        dịch tạo ra triển khai mặc định 'nguyên bản', điều này có thể giúp class giữ được các đặc
        tính tối ưu (như triviality) mà một thân hàm trống do người dùng định nghĩa có thể làm mất
        đi. Thứ hai, một sai lầm phổ biến là kỳ vọng `= default` sẽ tự động gán giá trị hữu ích cho
        các biến thành viên. Thực tế, nó không tự khởi tạo các kiểu dữ liệu cơ bản như `int`. Để
        `id` có giá trị 0, bạn cần sử dụng 'default member initializer' trong khai báo biến (ví dụ:
        `int id{};`)."
    rubric:
      required:
        - Phân biệt được `= default` là compiler-generated còn `{}` là user-defined
        - Khẳng định `= default` không tự khởi tạo giá trị cho các kiểu dữ liệu cơ bản như int
      bonus:
        - Đề cập đến giải pháp sử dụng default member initializer (ví dụ `int id{};`) để có giá trị
          mặc định
      misconceptions:
        - Tin rằng `= default` sẽ tự động xóa sạch bộ nhớ hoặc gán 0 cho mọi biến thành viên
    sources:
      - sectionId: default-vs-an-empty-body
      - sectionId: common-mistakes
    sourceHash: 858ea00b54d09ef8a71c834ad89beb8edeb71d18aff23342cc6cf7f256fbc0ef
    status: draft
    version: 1
  - id: cpp11-override-001
    lessonId: cpp11-override
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Trong đoạn mã sau, tại sao trình biên dịch sẽ báo lỗi? Nếu chúng ta loại bỏ từ khóa
      `override`, chương trình có biên dịch được không và hệ quả là gì?
    code: |-
      class Animal {
      public:
          virtual void talk() const {
              std::cout << "Animal sound";
          }
      };

      class Cat : public Animal {
      public:
          void talk() override {
              std::cout << "Meow";
          }
      };
    hint: Hãy chú ý kỹ đến từ khóa `const` ở hàm của lớp cha và lớp con.
    answer:
      short: Trình biên dịch báo lỗi vì thiếu từ khóa `const` ở lớp con khiến chữ ký hàm không khớp; nếu
        bỏ `override`, mã sẽ biên dịch được nhưng hàm sẽ không thực hiện ghi đè (override) như mong
        đợi.
      detailed: Trình biên dịch báo lỗi vì hàm `talk()` trong lớp `Cat` thiếu từ khóa `const`, dẫn đến chữ
        ký hàm không khớp hoàn toàn với hàm ảo trong lớp `Animal`. Từ khóa `override` yêu cầu trình
        biên dịch kiểm tra sự trùng khớp này. Nếu loại bỏ `override`, chương trình sẽ biên dịch được
        nhưng `Cat::talk()` sẽ được coi là một hàm mới hoàn toàn thay vì ghi đè hàm của lớp cha. Khi
        đó, nếu gọi hàm thông qua con trỏ `Animal*`, hàm của lớp cha vẫn sẽ được thực thi thay vì
        hàm của lớp con.
    rubric:
      required:
        - Giải thích được sự khác biệt về chữ ký hàm do thiếu `const`
        - Nêu được vai trò của `override` trong việc bắt lỗi biên dịch
        - Xác định được hệ quả khi bỏ `override` (trở thành hàm mới, không ghi đè)
      bonus:
        - Đề cập đến việc gọi hàm qua con trỏ lớp cha sẽ không ra kết quả mong muốn nếu không ghi đè
          thành công
      misconceptions:
        - Cho rằng chỉ cần trùng tên hàm là đủ để override
    sources:
      - sectionId: common-mistake-missing-const
      - sectionId: what-problem-does-it-solve
      - sectionId: important-rules
    sourceHash: a28dfa796b924fc80685b2175d2126c1a7cad1f7f8b3e0836b2e9ed0dda4e9d5
    status: draft
    version: 1
  - id: cpp11-override-002
    lessonId: cpp11-override
    type: recall
    difficulty: beginner
    estimatedMinutes: 3
    prompt: Dựa trên mô hình tư duy (Mental Model) được cung cấp, hãy giải thích sự khác biệt về vai trò
      giữa từ khóa `virtual` và `override`. Bạn nên sử dụng `override` khi nào?
    hint: Một từ khóa cho phép hành động, một từ khóa kiểm tra hành động đó.
    answer:
      short: "`virtual` cho phép một hàm có thể được thay thế, trong khi `override` yêu cầu trình biên
        dịch kiểm tra xem hàm đó có thực sự thay thế một hàm ảo từ lớp cha hay không. Nên dùng
        `override` bất cứ khi nào lớp con thay thế một hàm ảo."
      detailed: "Theo mô hình tư duy: `virtual` = cho phép thay thế (allows replacing), còn `override` =
        kiểm tra việc thay thế (checks replacing). Từ khóa `override` đóng vai trò như một lời chỉ
        thị cho trình biên dịch để xác nhận rằng hàm ở lớp con thực sự ghi đè một hàm ảo từ lớp cha.
        Bạn nên sử dụng `override` trong mọi trường hợp khi một lớp con định nghĩa lại một hàm ảo
        của lớp cha để tránh các lỗi sai tên, sai tham số hoặc thiếu `const`."
    rubric:
      required:
        - Phân biệt được `virtual` dùng ở lớp cha và `override` dùng ở lớp con
        - Nêu được ý nghĩa của `override` là yêu cầu trình biên dịch kiểm tra
        - Khẳng định nên dùng `override` bất cứ khi nào ghi đè hàm ảo
      bonus:
        - "Trích dẫn đúng mô hình: virtual = allows replacing, override = checks replacing"
      misconceptions:
        - Nghĩ rằng `override` là bắt buộc để hàm có thể hoạt động đa hình (thực tế nó chỉ để kiểm
          tra lỗi)
    sources:
      - sectionId: easy-mental-model
      - sectionId: minimal-syntax
      - sectionId: important-rules
    sourceHash: a28dfa796b924fc80685b2175d2126c1a7cad1f7f8b3e0836b2e9ed0dda4e9d5
    status: draft
    version: 1
  - id: cpp11-final-001
    lessonId: cpp11-final
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Đoạn mã dưới đây có lỗi biên dịch không? Nếu có, hãy giải thích lý do tại sao dựa trên quy
      tắc của từ khóa `final`.
    code: |-
      class Base {
      public:
          virtual void execute() {}
      };

      class Middle : public Base {
      public:
          void execute() override final {}
      };

      class Leaf : public Middle {
      public:
          void execute() override {}
      };
    hint: Hãy chú ý đến vị trí của từ khóa `final` trong lớp `Middle` và nỗ lực ghi đè (override) trong
      lớp `Leaf`.
    answer:
      short: Đoạn mã bị lỗi biên dịch vì lớp `Leaf` cố gắng ghi đè hàm `execute()` đã được đánh dấu là
        `final` trong lớp `Middle`.
      detailed: Từ khóa `final` khi áp dụng cho một hàm ảo (virtual function) sẽ ngăn chặn mọi nỗ lực ghi
        đè hàm đó ở các lớp dẫn xuất sau này. Trong ví dụ này, `Middle::execute()` đã ghi đè thành
        công `Base::execute()` nhưng đồng thời đánh dấu nó là `final`. Do đó, bất kỳ lớp nào kế thừa
        từ `Middle` (như lớp `Leaf`) đều không được phép thay thế hành vi của hàm này nữa. Việc cố
        gắng làm vậy sẽ dẫn đến lỗi biên dịch.
    rubric:
      required:
        - Xác định được lỗi nằm ở lớp Leaf
        - Giải thích được rằng final ngăn chặn việc ghi đè (overriding) thêm nữa
      bonus:
        - Đề cập rằng final chuyển đổi một hạn chế kiến trúc thành một quy tắc kiểm tra tại thời
          điểm biên dịch
      misconceptions:
        - Nhầm lẫn rằng final ngăn cản việc kế thừa toàn bộ lớp Middle (chỉ hàm execute bị chặn)
    sources:
      - sectionId: function-level-final
      - sectionId: common-errors
      - sectionId: mental-model
    sourceHash: 19f19b7364ebeadd68b8db56c085188582b10110fb7686e2e5fcbc838bac40ae
    status: draft
    version: 1
  - id: cpp11-final-002
    lessonId: cpp11-final
    type: scenario
    difficulty: beginner
    estimatedMinutes: 7
    prompt: Trong thiết kế phần mềm bằng C++, khi nào bạn nên đánh dấu một lớp là `final`? Việc sử dụng
      `final` bừa bãi cho mọi lớp có phải là một thói quen tốt không?
    hint: Hãy nghĩ về mục đích của việc kế thừa và những rủi ro khi thay đổi các thuật toán đã được kiểm
      chứng hoặc các quy tắc bảo mật.
    answer:
      short: Nên dùng `final` khi lớp không được thiết kế để làm lớp cơ sở hoặc để bảo vệ các thuật
        toán/quy tắc bảo mật cố định. Không nên dùng bừa bãi vì nó cản trở khả năng mở rộng hợp lệ.
      detailed: "Bạn nên sử dụng `final` cho một lớp khi: 1) Lớp đó đại diện cho tầng cuối cùng của một hệ
        thống phân cấp. 2) Lớp chứa các thuật toán đã được xác thực hoặc các quy tắc bảo mật/rủi ro
        không được phép thay đổi. 3) Lớp không được thiết kế để hỗ trợ việc kế thừa. Tuy nhiên,
        không nên thêm `final` ở khắp mọi nơi; chỉ nên sử dụng khi thiết kế cố tình cấm mở rộng
        thêm. Việc lạm dụng quá mức có thể ngăn cản các phần mở rộng hợp lệ của hệ thống phân cấp
        lớp trong tương lai."
    rubric:
      required:
        - "Nêu được ít nhất 2 trường hợp thực tế nên dùng final (ví dụ: bảo mật, thuật toán cố định)"
        - Giải thích được tác hại của việc lạm dụng final (ngăn cản mở rộng hợp lệ)
      bonus:
        - Nhắc đến việc final giúp biến ý đồ thiết kế thành quy tắc biên dịch
      misconceptions:
        - Cho rằng final giúp tăng hiệu năng (tài liệu không đề cập đến điều này)
    sources:
      - sectionId: class-level-final
      - sectionId: practical-uses
      - sectionId: recommended-style
      - sectionId: common-errors
    sourceHash: 19f19b7364ebeadd68b8db56c085188582b10110fb7686e2e5fcbc838bac40ae
    status: draft
    version: 1
  - id: cpp11-override-003
    lessonId: cpp11-override
    type: code_reasoning
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: >-
      Đoạn mã sau có vấn đề gì? `override` giúp phát hiện vấn đề đó như thế nào, và cần sửa ra sao
      để hàm ở `Cat` thực sự ghi đè hàm của `Animal`?


      ```cpp

      class Animal {

      public:
          virtual void talk() const;
      };


      class Cat : public Animal {

      public:
          void talk() override;
      };

      ```
    code: |-
      class Animal {
      public:
          virtual void talk() const;
      };

      class Cat : public Animal {
      public:
          void talk() override;
      };
    hint: So sánh đầy đủ tên hàm, tham số và `const` giữa lớp cha và lớp con.
    answer:
      short: "`Cat::talk()` thiếu `const`, nên không khớp với hàm ảo của `Animal`. Sửa thành `void talk()
        const override;`."
      detailed: >-
        Trong lớp cha, hàm được khai báo là `virtual void talk() const;`, còn trong lớp con lại là
        `void talk() override;`. Hai hàm khác nhau vì một hàm có `const` và một hàm không có. Khi
        dùng `override`, trình biên dịch sẽ báo lỗi vì hàm trong `Cat` không thực sự thay thế hàm ảo
        trong `Animal`. Cách sửa là:


        ```cpp

        class Cat : public Animal {

        public:
            void talk() const override;
        };

        ```


        `const` cũng phải khớp khi một hàm ở lớp con ghi đè hàm ảo của lớp cha.
    rubric:
      required:
        - Nhận ra sự khác biệt là thiếu `const`.
        - Nêu được `override` khiến trình biên dịch kiểm tra và báo lỗi.
        - Đưa ra bản sửa có `const override`.
      bonus:
        - Giải thích rằng tên hàm, tham số và `const` đều phải khớp.
      misconceptions:
        - Cho rằng chỉ cần cùng tên hàm là đủ để ghi đè.
        - Cho rằng `const` không ảnh hưởng đến việc khớp hàm.
    sources:
      - sectionId: common-mistake-missing-const
      - sectionId: important-rules
      - sectionId: what-problem-does-it-solve
    sourceHash: 1b45ef38d22b76f3bc79ef7f055599e7342f40260916abd9ddec4c92ce217921
    status: draft
    version: 1
  - id: cpp11-override-004
    lessonId: cpp11-override
    type: scenario
    difficulty: beginner
    estimatedMinutes: 4
    prompt: >-
      Một lập trình viên muốn `Cat` thay thế hành vi `talk()` của `Animal` khi gọi qua con trỏ
      `Animal*`, nhưng đã viết nhầm tên hàm trong lớp con:


      ```cpp

      class Animal {

      public:
          virtual void talk();
      };


      class Cat : public Animal {

      public:
          void taak();
      };

      ```


      Hãy giải thích vì sao `taak()` không thay thế `talk()`, và cho biết nên viết thế nào để trình
      biên dịch kiểm tra ý định này.
    code: |-
      class Animal {
      public:
          virtual void talk();
      };

      class Cat : public Animal {
      public:
          void taak();
      };
    hint: "`override` dùng để yêu cầu trình biên dịch xác nhận hàm lớp con thực sự thay thế một hàm ảo
      của lớp cha."
    answer:
      short: "`taak()` sai tên nên không thay thế `talk()`. Viết `void talk() override;` để trình biên
        dịch kiểm tra và báo lỗi nếu không khớp."
      detailed: >-
        `Animal` có hàm ảo tên `talk()`, nhưng `Cat` khai báo `taak()`. Vì tên hàm không khớp,
        `taak()` không ghi đè `talk()`. Nếu viết:


        ```cpp

        class Cat : public Animal {

        public:
            void taak() override;
        };

        ```


        trình biên dịch sẽ báo lỗi ngay vì `taak()` không thay thế hàm ảo nào của lớp cha. Cách đúng
        là:


        ```cpp

        class Cat : public Animal {

        public:
            void talk() override;
        };

        ```


        Ở đây, `virtual` trong lớp cha cho phép thay thế, còn `override` trong lớp con giúp kiểm tra
        việc thay thế đó.
    rubric:
      required:
        - Nhận ra `taak` và `talk` là hai tên khác nhau.
        - Giải thích rằng hàm sai tên không ghi đè hàm của lớp cha.
        - Đưa ra cách sửa `void talk() override;`.
      bonus:
        - Phân biệt được vai trò của `virtual` và `override`.
      misconceptions:
        - Cho rằng trình biên dịch tự hiểu `taak()` là lỗi chính tả của `talk()`.
        - Cho rằng chỉ cần khai báo một hàm trong lớp con là nó tự động ghi đè.
    sources:
      - sectionId: why-is-override-useful
