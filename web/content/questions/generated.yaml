  - id: cpp11-final-003
    lessonId: cpp11-final
    type: code_reasoning
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: >-
      Đoạn mã sau có lỗi gì? Hãy xác định chính xác khai báo nào vi phạm quy tắc của `final` và giải
      thích cách sửa phù hợp nếu mục tiêu là cho phép `Derived::run()` ghi đè `Base::run()` nhưng
      không cho lớp con tiếp tục ghi đè hàm này.


      ```cpp

      class Base {

      public:
          virtual void run();
      };


      class Derived : public Base {

      public:
          void run() override final;
      };


      class MoreDerived : public Derived {

      public:
          void run() override;
      };

      ```
    code: |-
      class Base {
      public:
          virtual void run();
      };

      class Derived : public Base {
      public:
          void run() override final;
      };

      class MoreDerived : public Derived {
      public:
          void run() override;
      };
    hint: "Phân biệt vai trò của `override` và `final`: một từ xác nhận việc ghi đè, còn một từ chặn
      việc ghi đè tiếp theo."
    answer:
      short: "`MoreDerived::run()` vi phạm vì `Derived::run()` đã được đánh dấu `final`. Giữ `override
        final` ở `Derived::run()` và loại bỏ `MoreDerived::run()` hoặc không cho lớp sau ghi đè hàm
        này."
      detailed: "`Derived::run()` hợp lệ: nó ghi đè hàm virtual của `Base`, nên `override` xác nhận quan
        hệ đó; đồng thời `final` quy định rằng không lớp dẫn xuất nào sau `Derived` được ghi đè
        `run()` nữa. Vì vậy, khai báo `MoreDerived::run() override` gây lỗi biên dịch. Nếu thiết kế
        yêu cầu `Derived` là lớp cuối cùng được thay đổi hành vi của `run`, hãy giữ `void run()
        override final;` và không khai báo một bản ghi đè khác trong lớp dẫn xuất sau đó. Nếu muốn
        tiếp tục cho phép ghi đè, không được đánh dấu hàm ở `Derived` là `final`. Đây là quy tắc ở
        mức hàm, khác với việc đánh dấu toàn bộ lớp là `final`."
    rubric:
      required:
        - Nhận diện đúng lỗi biên dịch tại `MoreDerived::run()`.
        - Giải thích đúng rằng `final` chặn mọi ghi đè tiếp theo.
        - Phân biệt được `override` với `final`.
      bonus:
        - Phân biệt `final` ở mức hàm với `final` ở mức lớp.
      misconceptions:
        - Cho rằng `override final` cấm chính `Derived::run()` ghi đè `Base::run()`.
        - Cho rằng `override` tự động ngăn các lớp sau ghi đè.
        - Cho rằng chỉ cần đánh dấu `MoreDerived::run()` bằng `override` là có thể vượt qua `final`.
    sources:
      - sectionId: function-level-final
      - sectionId: relationship-with-virtual-and-override
      - sectionId: common-errors
      - sectionId: mental-model
    sourceHash: fc7ac9f621f7efded324f5c2a7518355a7517add3b7426ead4c4e40466c85475
