  - id: cpp11-old-style-enum-001
    lessonId: cpp11-old-style-enum
    type: pitfall
    difficulty: beginner
    estimatedMinutes: 3
    prompt: Tại sao đoạn mã sau đây lại gây ra lỗi biên dịch (compiler error) trong C++? Vấn đề này phản
      ánh nhược điểm gì của old-style enum?
    code: |-
      enum Side {
          Buy,
          Sell
      };

      enum Action {
          Buy,
          Cancel
      };
    hint: Hãy xem xét phạm vi (scope) của các tên hằng số như 'Buy' trong old-style enum.
    answer:
      short: Lỗi xung đột tên (name conflict) do các giá trị enum bị rò rỉ vào phạm vi bao quanh
        (surrounding scope).
      detailed: Trong old-style enum, các tên hằng số (như Buy, Sell) không được đóng gói trong phạm vi
        của enum đó mà bị 'rò rỉ' trực tiếp ra phạm vi bên ngoài. Do đó, khi hai enum khác nhau
        (Side và Action) cùng định nghĩa một tên hằng số là 'Buy' trong cùng một phạm vi, trình biên
        dịch sẽ báo lỗi xung đột tên. Đây là một trong những lý do chính khiến C++11 giới thiệu
        'enum class' để giải quyết vấn đề về phạm vi.
    rubric:
      required:
        - Giải thích được lỗi xung đột tên (name conflict/redefinition)
        - Chỉ ra được nguyên nhân là do tên enum bị rò rỉ ra scope bên ngoài (leak into surrounding
          scope)
      bonus:
        - Nhắc đến việc C++11 dùng enum class để khắc phục lỗi này
      misconceptions:
        - Nhầm lẫn rằng lỗi do giá trị số (0, 1) trùng nhau thay vì do tên định danh trùng nhau
    sources:
      - sectionId: common-mistakes
      - sectionId: why-this-matters-before-enum-class
    sourceHash: ceecf76389592924d7bfee7907e79e219cb88ac5f3eb0daea6fbc9925be58271
    status: draft
    version: 1
  - id: cpp11-old-style-enum-002
    lessonId: cpp11-old-style-enum
    type: code_reasoning
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Giả sử bạn có một enum `Side { Buy, Sell };`. Đoạn mã `int x = Buy;` có biên dịch được
      không? Tại sao đặc điểm này lại được coi là một vấn đề về an toàn kiểu dữ liệu (type safety)
      trong các hệ thống lớn?
    hint: Hãy nhớ lại khả năng chuyển đổi ngầm định của old-style enum sang kiểu số nguyên.
    answer:
      short: Có thể biên dịch được do khả năng chuyển đổi ngầm định sang int, nhưng nó làm yếu tính an
        toàn kiểu dữ liệu.
      detailed: Đoạn mã hoàn toàn hợp lệ vì old-style enum có thể tự động chuyển đổi ngầm định (implicitly
        convert) sang kiểu số nguyên (int). Tuy nhiên, điều này làm yếu tính an toàn kiểu dữ liệu
        (type safety) vì trình biên dịch sẽ không ngăn chặn được việc gán hoặc so sánh nhầm lẫn giữa
        các enum khác nhau hoặc giữa enum với số nguyên không liên quan, dẫn đến các lỗi logic khó
        phát hiện trong các hệ thống phức tạp như hệ thống giao dịch (trading systems).
    rubric:
      required:
        - Xác nhận là có thể biên dịch được
        - Nêu được khái niệm chuyển đổi ngầm định sang int (implicit conversion to int)
        - Giải thích tại sao nó làm yếu tính an toàn kiểu (weakens type safety)
      bonus:
        - Đề cập đến việc khó phát hiện lỗi logic khi so sánh nhầm các loại enum khác nhau
      misconceptions:
        - Nghĩ rằng enum không thể gán cho int
    sources:
      - sectionId: common-mistakes
      - sectionId: why-this-matters-before-enum-class
      - sectionId: notes-for-trading-code
    sourceHash: ceecf76389592924d7bfee7907e79e219cb88ac5f3eb0daea6fbc9925be58271
    status: draft
    version: 1
  - id: cpp11-enum-class-001
    lessonId: cpp11-enum-class
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Tại sao việc sử dụng `enum class` lại được coi là an toàn hơn so với `enum` truyền thống
      (unscoped enum) trong C++? Hãy phân tích dựa trên hai vấn đề chính mà nó giải quyết.
    hint: Hãy tập trung vào phạm vi của các tên hằng số và khả năng tự động chuyển đổi kiểu dữ liệu.
    answer:
      short: Nó ngăn chặn rò rỉ tên vào phạm vi xung quanh và loại bỏ việc chuyển đổi ngầm định sang kiểu
        số nguyên.
      detailed: >-
        C++11 giới thiệu `enum class` để giải quyết hai nhược điểm lớn của `enum` cũ: 

        1. Rò rỉ tên (Name leakage): Với `enum` cũ, các giá trị (như Buy, Sell) được đưa trực tiếp
        vào phạm vi bao quanh, dễ gây xung đột tên. `enum class` yêu cầu truy cập thông qua tên enum
        (ví dụ: `Side::Buy`). 

        2. Định kiểu mạnh (Strong typing): `enum` cũ có thể tự động chuyển đổi sang `int`, dẫn đến
        các phép so sánh hoặc gán sai logic mà trình biên dịch không cảnh báo. `enum class` không
        cho phép chuyển đổi ngầm định này, giúp mã nguồn rõ ràng và an toàn hơn.
    rubric:
      required:
        - Giải thích được khái niệm rò rỉ tên (name leakage/scope leakage)
        - Giải thích được việc không cho phép chuyển đổi ngầm định sang int (implicit conversion)
      bonus:
        - Đưa ra ví dụ cụ thể về cú pháp Side::Buy
        - Đề cập đến việc cải thiện tính dễ đọc trong các hệ thống domain-specific như Trading
      misconceptions:
        - Cho rằng enum class chỉ là cách viết khác của enum mà không thay đổi hành vi biên dịch.
    sources:
      - sectionId: what-problem-does-it-solve
      - sectionId: why-enum-class-is-better-than-old-enum
    sourceHash: 6181e10b4b838470fb4fba54fd62cf49b6fdaa7601c95cbbdeb9f5111da26096
    status: draft
    version: 1
  - id: cpp11-enum-class-002
    lessonId: cpp11-enum-class
    type: code_reasoning
    difficulty: beginner
    estimatedMinutes: 5
    prompt: Xét đoạn mã sau đây. Đoạn mã này có biên dịch thành công không? Nếu không, hãy chỉ ra dòng
      gây lỗi và giải thích cách sửa lỗi dựa trên các quy tắc của `enum class`.
    code: |-
      enum class Side { Buy, Sell };

      int main() {
          Side mySide = Side::Buy;
          int value = mySide;
          return 0;
      }
    hint: Hãy nhớ rằng `enum class` có tính chất định kiểu mạnh (strongly typed).
    answer:
      short: Đoạn mã bị lỗi ở dòng `int value = mySide;`. Cần sử dụng `static_cast<int>(mySide)` để sửa
        lỗi.
      detailed: Lỗi xảy ra ở dòng `int value = mySide;` vì `enum class` không hỗ trợ chuyển đổi ngầm định
        sang kiểu `int`. Đây là một tính năng an toàn để tránh việc sử dụng nhầm lẫn các giá trị
        enum như các số nguyên thông thường. Để khắc phục khi thực sự cần lấy giá trị số nguyên (ví
        dụ để lưu trữ hoặc log), bạn phải thực hiện ép kiểu tường minh bằng cách sử dụng
        `static_cast<int>(mySide)`.
    rubric:
      required:
        - Xác định đúng dòng gán `int value = mySide` là dòng lỗi
        - Giải thích được lý do là do thiếu chuyển đổi ngầm định
        - Đưa ra giải pháp sử dụng static_cast
      bonus:
        - Giải thích tại sao tính năng này lại hữu ích trong việc tránh lỗi logic
      misconceptions:
        - Nghĩ rằng lỗi nằm ở dòng khai báo `Side::Buy`
    sources:
      - sectionId: common-mistakes
      - sectionId: why-enum-class-is-better-than-old-enum
    sourceHash: 6181e10b4b838470fb4fba54fd62cf49b6fdaa7601c95cbbdeb9f5111da26096
    status: draft
    version: 1
  - id: cpp11-initializer-list-001
    lessonId: cpp11-initializer-list
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Tại sao việc sử dụng brace initialization (khởi tạo bằng dấu ngoặc nhọn) lại được coi là an
      toàn hơn so với các kiểu khởi tạo truyền thống (như dấu `=` hoặc ngoặc đơn `()`)? Hãy giải
      thích thông qua khái niệm 'narrowing conversion'.
    code: |-
      int x = 3.14;  // Cách cũ
      int y{3.14};  // C++11 brace initialization
    hint: Hãy nghĩ về điều gì xảy ra với phần thập phân khi gán một số thực vào một biến kiểu số nguyên.
    answer:
      short: Brace initialization ngăn chặn 'narrowing conversion' bằng cách tạo ra lỗi biên dịch nếu dữ
        liệu bị mất mát trong quá trình chuyển đổi.
      detailed: "Trong các kiểu khởi tạo cũ, trình biên dịch thường cho phép chuyển đổi kiểu dữ liệu từ
        lớn sang nhỏ (như từ double sang int) một cách âm thầm, dẫn đến mất mát dữ liệu (ví dụ: 3.14
        bị cắt thành 3). Với brace initialization (`{}`), C++11 thực hiện kiểm tra nghiêm ngặt hơn.
        Nếu một giá trị không thể được biểu diễn chính xác trong kiểu đích, trình biên dịch sẽ báo
        lỗi 'narrowing conversion', giúp lập trình viên tránh được các lỗi logic khó tìm."
    rubric:
      required:
        - Giải thích được narrowing conversion là việc chuyển đổi làm mất mát thông tin
        - Nêu được rằng brace initialization sẽ gây lỗi biên dịch (compiler error) thay vì âm thầm
          thực hiện
      bonus:
        - Đề cập đến việc tính nhất quán (uniform initialization) trong cú pháp
      misconceptions:
        - Nhầm lẫn rằng cả hai cách đều gây lỗi biên dịch
    sources:
      - sectionId: why-brace-initialization-is-useful
      - sectionId: common-mistakes
    sourceHash: 6684d49feac6ccaa58b1651f290e6a61f4e4da3b13dc628118b7b3533b732524
    status: draft
    version: 1
  - id: cpp11-initializer-list-002
    lessonId: cpp11-initializer-list
    type: code_reasoning
    difficulty: intermediate
    estimatedMinutes: 4
    prompt: "Giả sử bạn đang làm việc với một hệ thống giao dịch chứng khoán. Hãy phân biệt kết quả của
      hai dòng mã sau và giải thích tại sao sự khác biệt này lại quan trọng khi khởi tạo container:"
    code: |-
      std::vector<int> a(5);
      std::vector<int> b{5};
    hint: Dấu ngoặc đơn và dấu ngoặc nhọn gọi các constructor khác nhau của std::vector.
    answer:
      short: "`a(5)` tạo ra một vector gồm 5 phần tử có giá trị mặc định (0), trong khi `b{5}` tạo ra một
        vector chỉ có 1 phần tử mang giá trị là 5."
      detailed: >-
        Sự khác biệt nằm ở constructor được gọi: 

        1. `std::vector<int> a(5)` sử dụng constructor nhận tham số là kích thước (size), tạo ra 5
        số không.

        2. `std::vector<int> b{5}` ưu tiên sử dụng 'initializer-list constructor', coi giá trị trong
        ngoặc nhọn là các phần tử thực tế của vector. 

        Điều này rất quan trọng vì nếu nhầm lẫn, bạn có thể tạo ra một danh sách dữ liệu (như danh
        sách mã lệnh hoặc giá) sai lệch hoàn toàn so với dự định ban đầu.
    rubric:
      required:
        - Xác định đúng số lượng phần tử của mỗi vector
        - Xác định đúng giá trị bên trong của mỗi vector
        - Giải thích được sự ưu tiên của initializer-list constructor khi dùng dấu ngoặc nhọn
      bonus:
        - Liên hệ được với việc khởi tạo dữ liệu mẫu (test data) trong trading
      misconceptions:
        - Cho rằng cả hai đều tạo ra vector có 5 phần tử
    sources:
      - sectionId: common-mistakes
      - sectionId: end-of-day-checklist
    sourceHash: 6684d49feac6ccaa58b1651f290e6a61f4e4da3b13dc628118b7b3533b732524
    status: draft
    version: 1
  - id: cpp11-lambda-basic-001
    lessonId: cpp11-lambda-basic
    type: scenario
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Trong phát triển phần mềm C++, đặc biệt là trong các hệ thống giao dịch (trading), khi nào
      bạn nên ưu tiên sử dụng lambda thay vì một hàm có tên (named function) và ngược lại?
    hint: Hãy nghĩ về phạm vi sử dụng (scope), độ dài của logic và khả năng tái sử dụng.
    answer:
      short: Sử dụng lambda cho logic ngắn, cục bộ và dùng một lần (như trong thuật toán STL). Sử dụng hàm
        có tên khi logic phức tạp, cần tái sử dụng ở nhiều nơi hoặc khi tên hàm giúp mã nguồn rõ
        nghĩa hơn.
      detailed: "Theo tài liệu, lambda là các hàm không tên được viết trực tiếp tại nơi cần thiết. Bạn nên
        sử dụng lambda khi: 1. Logic ngắn gọn và chỉ sử dụng cục bộ. 2. Cần định nghĩa quy tắc tùy
        chỉnh cho các thuật toán STL (như sắp xếp hoặc lọc lệnh). 3. Trong trading, lambda giúp viết
        nhanh các quy tắc như kiểm tra khối lượng lệnh (quantity threshold) mà không làm loãng mã
        nguồn bằng quá nhiều hàm nhỏ. Ngược lại, nên tránh lambda và dùng hàm có tên khi: 1. Logic
        quá dài và phức tạp. 2. Logic cần được tái sử dụng ở nhiều vị trí khác nhau. 3. Một hàm có
        tên cụ thể sẽ giúp mã nguồn dễ đọc và bảo trì hơn."
    rubric:
      required:
        - Nêu được lambda dùng cho logic ngắn/cục bộ
        - Nêu được lambda dùng với thuật toán STL
        - Nêu được khi nào nên dùng hàm có tên (tái sử dụng, logic phức tạp)
      bonus:
        - Liên hệ được ví dụ trong hệ thống trading (lọc lệnh, sắp xếp giá)
      misconceptions:
        - Cho rằng lambda có thể thay thế hoàn toàn hàm có tên trong mọi trường hợp
    sources:
      - sectionId: what-problem-does-lambda-solve
