  - id: cpp11-lambda-basic-002
    lessonId: cpp11-lambda-basic
    type: pitfall
    difficulty: beginner
    estimatedMinutes: 4
    prompt: Đoạn mã dưới đây có một lỗi logic phổ biến khi sử dụng lambda. Hãy chỉ ra lỗi đó và cách
      khắc phục để chương trình in ra đúng kết quả mong muốn.
    code: |-
      auto isLargeOrder = [](int quantity) {
          return quantity > 1000;
      };

      int myQuantity = 1500;
      // Kiểm tra xem đơn hàng có lớn không
      if (isLargeOrder) {
          std::cout << "Order is large";
      }
    hint: Việc khai báo một lambda và việc thực thi nó là hai bước khác nhau.
    answer:
      short: Lỗi là quên gọi lambda (Forgetting to call the lambda). Cần sửa thành
        `isLargeOrder(myQuantity)`.
      detailed: "Trong đoạn mã trên, `isLargeOrder` chỉ là tên biến lưu trữ đối tượng lambda. Khi đặt vào
        câu lệnh `if (isLargeOrder)`, chương trình không thực thi logic bên trong lambda mà chỉ kiểm
        tra sự tồn tại của đối tượng đó (thường luôn trả về true hoặc gây cảnh báo). Để thực thi
        logic kiểm tra khối lượng, bạn phải gọi lambda kèm theo tham số bằng cú pháp:
        `isLargeOrder(myQuantity)`."
    rubric:
      required:
        - Nhận diện được lỗi quên gọi hàm (missing function call)
        - "Cung cấp đúng cú pháp sửa lỗi: isLargeOrder(myQuantity)"
      bonus:
        - Giải thích được rằng isLargeOrder chỉ là đối tượng lưu trữ logic
      misconceptions:
        - Nhầm lẫn rằng lambda tự động thực thi khi được đặt trong câu lệnh điều kiện
    sources:
      - sectionId: common-mistakes
      - sectionId: minimum-syntax
    sourceHash: b536281a684c420b3787a07c92cc2693a783ef56882533c4e5bf1a2123ca6b41
