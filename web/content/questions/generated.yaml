schemaVersion: 1
questions:
  - id: cpp11-range-based-for-001
    lessonId: cpp11-range-based-for
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Giả sử bạn đang làm việc với một hệ thống giao dịch (trading system) có một
      `std::vector<Position>` chứa hàng ngàn đối tượng. Đoạn mã sau có vấn đề gì về hiệu suất và
      tính đúng đắn nếu mục tiêu là cập nhật giá (`last_price`) cho từng vị thế?
    code: |-
      for (auto pos : positions) {
          pos.last_price = current_market_price;
      }
    hint: Hãy chú ý đến cách biến `pos` được khai báo và liệu nó có thực sự tham chiếu đến dữ liệu gốc
      trong vector hay không.
    answer:
      short: Đoạn mã tạo bản sao của từng đối tượng (gây tốn hiệu suất) và không cập nhật được dữ liệu gốc
        trong vector.
      detailed: >-
        Có hai vấn đề nghiêm trọng trong đoạn mã này: 

        1. Hiệu suất: Việc sử dụng `auto pos` sẽ tạo một bản sao (copy) của mỗi cấu trúc `Position`
        trong mỗi lần lặp. Trong các hệ thống nhạy cảm về hiệu suất như trading, việc sao chép các
        đối tượng lớn một cách không cần thiết sẽ gây chậm hệ thống.

        2. Tính đúng đắn: Vì `pos` chỉ là một bản sao cục bộ, lệnh gán `pos.last_price` chỉ thay đổi
        giá trị trên bản sao đó. Sau khi vòng lặp kết thúc, dữ liệu gốc trong `positions` vẫn không
        thay đổi. Để khắc phục cả hai vấn đề, cần sử dụng tham chiếu: `for (auto& pos : positions)`.
    rubric:
      required:
        - Giải thích được rằng `auto` tạo ra bản sao (copy)
        - Chỉ ra được dữ liệu gốc không bị thay đổi
        - Đề xuất giải pháp sử dụng `auto&`
      bonus:
        - Đề cập đến việc sao chép đối tượng lớn ảnh hưởng đến hiệu suất trong trading
      misconceptions:
        - Lầm tưởng rằng `auto` sẽ tự động suy luận ra tham chiếu trong vòng lặp range-based for
    sources:
      - sectionId: minimum-syntax
      - sectionId: common-mistakes
      - sectionId: notes-for-trading-performance-sensitive-code
    sourceHash: c4f64c954dbcb3f643cce352b7d46c0ccec30159b70e772f38ffee06c0af2aa7
    status: draft
    version: 1
  - id: cpp11-range-based-for-002
    lessonId: cpp11-range-based-for
    type: scenario
    difficulty: beginner
    estimatedMinutes: 4
    prompt: Trong quá trình tái cấu trúc mã nguồn (refactoring), bạn muốn chuyển đổi các vòng lặp sử
      dụng iterator cũ sang range-based for. Tuy nhiên, có những tình huống cụ thể nào mà bạn KHÔNG
      NÊN sử dụng range-based for?
    hint: Hãy nghĩ về các trường hợp bạn cần can thiệp sâu vào vị trí của phần tử hoặc thay đổi kích
      thước của danh sách.
    answer:
      short: Không nên dùng khi cần chỉ số (index), khi cần xóa phần tử trong lúc lặp, hoặc khi cần điều
        khiển iterator phức tạp.
      detailed: >-
        Mặc dù range-based for giúp mã nguồn sạch hơn, nhưng nên tránh sử dụng trong các trường hợp
        sau:

        1. Khi cần sử dụng chỉ số (index) của phần tử (ví dụ: cần biến `i` để tính toán logic).

        2. Khi cần thay đổi cấu trúc của container ngay trong vòng lặp, chẳng hạn như xóa (erase)
        phần tử, vì việc này có thể làm mất hiệu lực (invalidate) các iterator ngầm định của vòng
        lặp.

        3. Khi cần các kiểu duyệt phức tạp hơn là đi qua từng phần tử từ đầu đến cuối (ví dụ: duyệt
        ngược, hoặc nhảy cách quãng).
    rubric:
      required:
        - Nêu được trường hợp cần chỉ số (index)
        - Nêu được trường hợp xóa/thêm phần tử làm invalidate iterator
      bonus:
        - Nêu được trường hợp cần điều khiển iterator phức tạp (duyệt ngược, nhảy bước)
      misconceptions:
        - Cho rằng range-based for có thể thay thế hoàn toàn mọi loại vòng lặp for truyền thống
    sources:
      - sectionId: common-mistakes
      - sectionId: when-should-you-use-it
    sourceHash: c4f64c954dbcb3f643cce352b7d46c0ccec30159b70e772f38ffee06c0af2aa7
    status: draft
    version: 1
  - id: cpp98-object-variable-memory-001
    lessonId: cpp98-object-variable-memory
    type: recall
    difficulty: beginner
    estimatedMinutes: 5
    prompt: Trong C++, sự khác biệt cơ bản giữa 'biến' (variable) và 'đối tượng' (object) là gì? Hãy
      giải thích mối quan hệ giữa chúng.
    hint: Hãy nghĩ về cái tên bạn viết trong mã nguồn và thực thể thực sự nằm trong bộ nhớ RAM.
    answer:
      short: Biến là tên gọi (định danh) trong mã nguồn, còn đối tượng là thực thể thực tế được lưu trữ
        trong bộ nhớ.
      detailed: "Biến (variable) đóng vai trò là một cái tên để chương trình có thể truy cập vào dữ liệu.
        Đối tượng (object) là vùng lưu trữ có kiểu dữ liệu cụ thể trong bộ nhớ. Mối quan hệ giữa
        chúng là: tên biến tham chiếu đến (refers to) đối tượng trong bộ nhớ. Sự phân biệt này trở
        nên quan trọng khi học về con trỏ, tham chiếu và quản lý vòng đời đối tượng."
    rubric:
      required:
        - Biến là tên/định danh
        - Đối tượng là thực thể/vùng lưu trữ trong bộ nhớ
      bonus:
        - Nhắc đến việc biến tham chiếu đến đối tượng
        - Giải thích tại sao sự phân biệt này quan trọng cho con trỏ/tham chiếu
      misconceptions:
        - Coi biến và đối tượng là một khái niệm hoàn toàn giống hệt nhau
    sources:
      - sectionId: what-problem-does-this-solve
      - sectionId: object-vs-variable
      - sectionId: conclusion
    sourceHash: b959f00fa3b7fd7587e37fbbb0f1cac44d6285a9a6bd7afcbdaceea3626b6637
    status: draft
    version: 1
  - id: cpp98-object-variable-memory-002
    lessonId: cpp98-object-variable-memory
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 8
    prompt: Xét đoạn mã giả định trong một hệ thống giao dịch dưới đây. Hãy chỉ ra lỗi nghiêm trọng liên
      quan đến bộ nhớ và giải thích điều gì xảy ra nếu ta thực hiện lệnh gán `int copySpread =
      spread;`.
    code: |-
      int bidPrice = 100;
      int askPrice; // Không khởi tạo
      int spread = askPrice - bidPrice;
    hint: Hãy chú ý đến giá trị của askPrice khi chưa được gán và tính chất của việc sao chép giá trị
      giữa các biến cơ bản.
    answer:
      short: Lỗi uninitialized variable khiến spread có giá trị rác; lệnh gán tạo ra một bản sao độc lập
        (copy), không phải chia sẻ (sharing).
      detailed: >-
        1. Lỗi chưa khởi tạo: Biến `askPrice` là biến cục bộ không được khởi tạo nên nó chứa giá trị
        không dự đoán được (giá trị rác). Điều này dẫn đến biến `spread` mang giá trị sai, có thể
        gây ra các quyết định giao dịch rủi ro hoặc sai lầm tài chính. 

        2. Tính chất sao chép: Khi thực hiện `int copySpread = spread;`, giá trị của `spread` được
        sao chép sang một vùng bộ nhớ mới của `copySpread`. Đây là hai đối tượng độc lập; việc thay
        đổi `copySpread` sau đó sẽ không ảnh hưởng đến giá trị của `spread`.
    rubric:
      required:
        - Nhận diện lỗi biến chưa khởi tạo (uninitialized variable)
        - Giải thích được giá trị rác/không dự đoán được
        - Khẳng định việc gán tạo ra bản sao độc lập (independent value)
      bonus:
        - Liên hệ đến hậu quả trong hệ thống trading (sai lệch tính toán/rủi ro tài chính)
        - Phân biệt rõ giữa copy và sharing
      misconceptions:
        - Nghĩ rằng thay đổi bản sao sẽ làm thay đổi biến gốc
        - Cho rằng biến chưa khởi tạo mặc định bằng 0
    sources:
      - sectionId: common-mistakes
      - sectionId: notes-for-trading-code
    sourceHash: b959f00fa3b7fd7587e37fbbb0f1cac44d6285a9a6bd7afcbdaceea3626b6637
    status: draft
    version: 1
  - id: cpp98-reference-001
    lessonId: cpp98-reference
    type: recall
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Trong C++98, sự khác biệt chính giữa một tham chiếu (reference) và một con trỏ (pointer) là
      gì? Tại sao trong các ứng dụng hiệu năng cao như xử lý dữ liệu thị trường (market data), tham
      chiếu lại được ưu tiên hơn việc truyền tham trị (pass-by-value)?
    hint: Hãy nghĩ về việc khởi tạo, khả năng thay đổi đối tượng đích (rebinding), và chi phí tài nguyên
      khi truyền dữ liệu vào hàm.
    answer:
      short: Tham chiếu là bí danh (alias) của một đối tượng hiện có, phải được khởi tạo ngay, không thể
        null và không thể thay đổi đối tượng đích. Nó được ưu tiên vì giúp tránh chi phí sao chép
        (copy cost).
      detailed: "Tham chiếu (reference) khác với con trỏ ở ba điểm chính: 1) Phải được liên kết (bind)
        ngay khi khởi tạo. 2) Không thể thay đổi để trỏ sang đối tượng khác (cannot be reseated). 3)
        Thông thường không thể null. Trong các hệ thống trading, tham chiếu được ưu tiên hơn truyền
        tham trị vì nó không tạo ra bản sao của đối tượng, giúp tiết kiệm tài nguyên và tăng tốc độ
        xử lý khi làm việc với các cấu trúc dữ liệu lớn như Order Book hoặc dữ liệu thị trường."
    rubric:
      required:
        - Tham chiếu phải được khởi tạo khi khai báo
        - Tham chiếu không thể thay đổi đối tượng đích (cannot be reseated)
        - Tham chiếu giúp tránh chi phí sao chép (no copy cost)
      bonus:
        - Tham chiếu sử dụng cú pháp đối tượng thông thường, không cần giải tham chiếu
          (dereferencing)
        - Tham chiếu an toàn hơn con trỏ thô (raw pointers)
      misconceptions:
        - Lầm tưởng tham chiếu là một đối tượng mới chiếm bộ nhớ riêng biệt
        - Lầm tưởng có thể thay đổi tham chiếu để trỏ sang biến khác sau khi đã khởi tạo
    sources:
      - sectionId: reference-vs-pointer
      - sectionId: notes-for-trading-code
      - sectionId: what-problem-does-this-solve
    sourceHash: e9060a1301c4e23e5338a9e3224d05afcd5cd1aab0074963e75ab012c467cb72
    status: draft
    version: 1
  - id: cpp98-reference-002
    lessonId: cpp98-reference
    type: pitfall
    difficulty: advanced
    estimatedMinutes: 7
    prompt: Phân tích lỗi tiềm ẩn trong đoạn mã sau đây và giải thích tại sao nó lại nguy hiểm trong lập
      trình C++.
    code: |-
      int& getIncrementedValue(int input) {
          int result = input + 1;
          return result;
      }
    hint: Hãy xem xét vòng đời (lifetime) của biến 'result' sau khi hàm kết thúc.
    answer:
      short: Đoạn mã tạo ra một 'dangling reference' (tham chiếu lơ lửng) vì trả về tham chiếu đến một đối
        tượng cục bộ đã bị hủy.
      detailed: Biến 'result' là một đối tượng cục bộ (local object), nó sẽ bị hủy (die) ngay khi hàm
        'getIncrementedValue' kết thúc và giải phóng ngăn xếp (stack). Việc trả về một tham chiếu
        đến biến này khiến tham chiếu đó trỏ vào một vùng nhớ không còn hợp lệ. Đây gọi là lỗi
        'dangling reference', dẫn đến hành vi không xác định (undefined behavior) khi chương trình
        cố gắng sử dụng giá trị này sau đó.
    rubric:
      required:
        - Nhận diện được lỗi trả về tham chiếu của biến cục bộ
        - Giải thích được biến cục bộ bị hủy khi hàm kết thúc
        - Sử dụng thuật ngữ 'dangling reference' hoặc 'tham chiếu lơ lửng'
      bonus:
        - Giải thích được hậu quả là hành vi không xác định (undefined behavior)
      misconceptions:
        - Nghĩ rằng tham chiếu sẽ giữ cho biến cục bộ tiếp tục tồn tại
    sources:
      - sectionId: common-mistakes
      - sectionId: memory-model
    sourceHash: e9060a1301c4e23e5338a9e3224d05afcd5cd1aab0074963e75ab012c467cb72
    status: draft
    version: 1
  - id: cpp98-array-one-past-end-001
    lessonId: cpp98-array-one-past-end
    type: pitfall
    difficulty: beginner
    estimatedMinutes: 3
    prompt: Giả sử bạn có một mảng được khai báo là `int prices[5]`. Con trỏ `prices + 5` trỏ đến vị trí
      nào trong bộ nhớ, và tại sao việc thực hiện thao tác `*(prices + 5)` lại bị coi là một lỗi
      nghiêm trọng?
    hint: Hãy nhớ lại khái niệm về vị trí ngay sau phần tử cuối cùng và quy tắc giải tham chiếu
      (dereferencing).
    answer:
      short: Con trỏ `prices + 5` trỏ đến vị trí "one-past-end" (ngay sau phần tử cuối cùng). Việc giải
        tham chiếu nó là lỗi vì vị trí này không chứa phần tử hợp lệ, dẫn đến hành vi không xác định
        (undefined behavior).
      detailed: Trong mô hình bộ nhớ của C++, `prices + 5` trỏ đến vị trí ngay sau phần tử cuối cùng của
        mảng (`prices[4]`). Đây được gọi là vị trí 'one-past-end'. Mặc dù C++ cho phép tạo và giữ
        con trỏ này để làm mốc đánh dấu, nhưng nó không đại diện cho một đối tượng thực sự trong
        mảng. Do đó, việc giải tham chiếu (dereferencing) bằng toán tử `*` sẽ cố gắng truy cập vào
        vùng nhớ không thuộc quyền sở hữu của mảng, gây ra hành vi không xác định (undefined
        behavior).
    rubric:
      required:
        - Xác định được prices + 5 là vị trí one-past-end
        - Khẳng định giải tham chiếu là hành vi không xác định (undefined behavior)
        - Giải thích được vị trí này không phải là một phần tử thực sự
      bonus:
        - Nhắc đến việc chỉ có duy nhất một vị trí sau mảng là hợp lệ để trỏ tới
      misconceptions:
        - Nhầm lẫn rằng prices + 5 trỏ đến phần tử cuối cùng (prices[4])
    sources:
      - sectionId: one-past-end
      - sectionId: common-mistakes
      - sectionId: memory-model
    sourceHash: a2cecfa2c0f84182c8927b8f56c3b3af6f1f35e093a57eae06a0f35003520866
    status: draft
    version: 1
  - id: cpp98-array-one-past-end-002
    lessonId: cpp98-array-one-past-end
    type: scenario
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Trong các hệ thống giao dịch tài chính yêu cầu hiệu năng cao, tại sao việc sử dụng mảng và
      quy ước `[begin, end)` (với `end` là con trỏ one-past-end) lại được ưu tiên khi xử lý danh
      sách giá (prices)? Những thao tác nào là hợp lệ với con trỏ `end` này?
    hint: Hãy xem xét về cách sắp xếp bộ nhớ (memory layout) và cách các thuật toán STL hoạt động.
    answer:
      short: Mảng cung cấp lưu trữ liên tục và thân thiện với bộ nhớ đệm (cache). Quy ước `[begin, end)`
        giúp các thuật toán STL và vòng lặp hoạt động nhất quán. Các thao tác hợp lệ với `end` gồm
        so sánh, phép trừ và dùng làm điều kiện dừng vòng lặp.
      detailed: "Mảng được ưu tiên vì các phần tử được lưu trữ liên tục, giúp truy cập nhanh và tận dụng
        tốt bộ nhớ đệm (cache locality), rất quan trọng trong trading. Quy ước `[begin, end)` của
        STL sử dụng con trỏ one-past-end làm điểm mốc để xác định phạm vi nửa mở. Với con trỏ `end`
        này, lập trình viên có thể thực hiện các thao tác hợp lệ như: so sánh (ví dụ `p != end` để
        dừng vòng lặp) và phép trừ (để tính toán số lượng phần tử trong mảng). Tuy nhiên, tuyệt đối
        không được giải tham chiếu con trỏ này."
    rubric:
      required:
        - Giải thích được lợi ích của lưu trữ liên tục (contiguous storage/cache locality)
        - Nêu được vai trò của one-past-end trong việc dừng vòng lặp hoặc STL
        - "Liệt kê các thao tác hợp lệ: so sánh, phép trừ"
      bonus:
        - Kết nối được với các thuật toán STL như sort, find hoặc copy
      misconceptions:
        - Cho rằng con trỏ end có thể dùng để truy cập dữ liệu
    sources:
      - sectionId: what-problem-does-this-solve
      - sectionId: one-past-end
      - sectionId: stl-connection
      - sectionId: notes-for-trading-code
    sourceHash: a2cecfa2c0f84182c8927b8f56c3b3af6f1f35e093a57eae06a0f35003520866
    status: draft
    version: 1
  - id: cpp11-using-alias-001
    lessonId: cpp11-using-alias
    type: code_reasoning
    difficulty: intermediate
    estimatedMinutes: 5
    prompt: Trong C++11, tại sao việc sử dụng `using` alias được coi là ưu việt hơn so với `typedef`
      truyền thống, đặc biệt là khi làm việc với các kiểu dữ liệu generic (templates)? Hãy minh họa
      bằng cách tạo một alias cho `std::vector<T>`.
    code: |-
      template <typename T>
      using Vec = std::vector<T>;

      // So sánh với cách làm cũ dùng typedef (phải bọc trong struct/class)
      // template <typename T>
      // struct MyStorage {
      //     typedef std::vector<T> type;
      // };
    hint: Hãy xem xét cú pháp khi định nghĩa alias cho template và tính dễ đọc của nó so với cách tiếp
      cận cũ.
    answer:
      short: '`using` hỗ trợ trực tiếp "alias templates", giúp cú pháp ngắn gọn và dễ đọc hơn nhiều so với
        `typedef`.'
      detailed: Trong khi `typedef` yêu cầu các thủ thuật phức tạp (như bọc trong một struct) để tạo alias
        cho template, `using` trong C++11 cho phép định nghĩa trực tiếp (alias templates). Cú pháp
        của `using` tuân theo logic `Tên_Mới = Kiểu_Cũ`, giúp người đọc dễ dàng nhận biết tên mới
        đang đại diện cho kiểu dữ liệu nào, đặc biệt hữu ích khi xử lý các container phức tạp của
        STL.
    rubric:
      required:
        - Nêu được khái niệm alias templates
        - Giải thích được sự khác biệt về cú pháp (using rõ ràng hơn typedef)
        - Xác nhận typedef không hỗ trợ trực tiếp template alias như using
      bonus:
        - Đề cập đến việc cải thiện khả năng bảo trì mã nguồn khi làm việc với STL
      misconceptions:
        - Lầm tưởng rằng typedef và using có hiệu năng khác nhau (thực tế chúng chỉ khác về cú pháp
          và tính năng biên dịch)
    sources:
      - sectionId: using-vs-typedef
      - sectionId: minimum-syntax
    sourceHash: b24249c84b39083ab8375737fe4a34a883a0231974228c5461bff57a8426812c
    status: draft
    version: 1
  - id: cpp11-using-alias-002
    lessonId: cpp11-using-alias
    type: pitfall
    difficulty: intermediate
    estimatedMinutes: 7
    prompt: >-
      Xét đoạn mã sau trong một hệ thống giao dịch tài chính:


      `using Price = double;` 

      `using Quantity = double;` 


      Nếu một lập trình viên vô tình gán một giá trị kiểu `Price` vào một biến kiểu `Quantity`,
      trình biên dịch có đưa ra cảnh báo hoặc lỗi không? Tại sao? Điều này ảnh hưởng gì đến tính an
      toàn (type safety) của hệ thống?
    hint: Hãy nhớ rằng alias chỉ là một 'tên gọi khác' chứ không phải là một kiểu dữ liệu độc lập hoàn
      toàn mới.
    answer:
      short: Không, trình biên dịch sẽ không báo lỗi vì `using` không tạo ra kiểu dữ liệu mới (strong
        type).
      detailed: Một sai lầm phổ biến là coi `using` alias tạo ra một kiểu dữ liệu mới độc lập. Thực tế,
        `Price` và `Quantity` trong trường hợp này đều chỉ là các tên gọi khác của kiểu `double`.
        Trình biên dịch coi chúng là hoàn toàn giống nhau, do đó nó không thể ngăn chặn việc trộn
        lẫn hoặc gán nhầm giữa các khái niệm nghiệp vụ khác nhau. Để có tính an toàn cao hơn (strong
        type safety), lập trình viên cần sử dụng các kỹ thuật khác như wrapper structs.
    rubric:
      required:
        - Khẳng định trình biên dịch không báo lỗi
        - Giải thích được alias không phải là kiểu dữ liệu mới (not a new strong type)
        - Nêu được rủi ro về việc trộn lẫn các khái niệm nghiệp vụ (domain concepts)
      bonus:
        - Đề cập đến giải pháp thay thế như wrapper structs để đạt được strong type safety
      misconceptions:
        - Tin rằng using tạo ra một lớp bảo vệ kiểu dữ liệu (type safety layer) mạnh mẽ
    sources:
      - sectionId: common-mistakes
      - sectionId: notes-for-trading-performance-sensitive-code
    sourceHash: b24249c84b39083ab8375737fe4a34a883a0231974228c5461bff57a8426812c
